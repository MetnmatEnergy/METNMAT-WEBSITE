# Build + DEPLOY the METNMAT website — used by the push-to-main Cloud Build trigger.
# Builds the image, pushes it to Artifact Registry, then deploys to Cloud Run.
# The deploy is image-only: env vars, secrets and the runtime service account are
# inherited from the existing metnmat-website service (set once via deploy-gcp.ps1).
#
# The build runs as the trigger's service account, which must have:
#   roles/run.admin + roles/iam.serviceAccountUser (on payload-storage-sa)
#   + roles/artifactregistry.writer + roles/logging.logWriter
# The Compute Engine default SA already has these.
substitutions:
  _REGION: asia-south1
  _REPO: metnmat
  _SITE_URL: https://www.metnmat.com
  _CMS_URL: https://admin.metnmat.com
  _CHATBOT_URL: https://chat.metnmat.com
steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -f
      - Dockerfile.website
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/website:latest
      - --build-arg
      - NEXT_PUBLIC_SITE_URL=${_SITE_URL}
      - --build-arg
      - NEXT_PUBLIC_CMS_URL=${_CMS_URL}
      - --build-arg
      - NEXT_PUBLIC_CHATBOT_URL=${_CHATBOT_URL}
      - .
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/website:latest
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - metnmat-website
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/website:latest
      - --region=${_REGION}
      - --quiet
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
timeout: 1800s
