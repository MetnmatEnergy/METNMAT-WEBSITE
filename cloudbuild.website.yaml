# Build + push the METNMAT website image to Artifact Registry (Cloud Build).
# Run from the monorepo root:
#   gcloud builds submit --config cloudbuild.website.yaml .
# Override URLs/region with --substitutions if your domains differ.
substitutions:
  _REGION: asia-south1
  _REPO: metnmat
  _SITE_URL: https://www.metnmat.com
  _CMS_URL: https://admin.metnmat.com
  _CHATBOT_URL: https://chat.metnmat.com
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.website
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/website:latest
      - --build-arg
      - NEXT_PUBLIC_SITE_URL=${_SITE_URL}
      - --build-arg
      - NEXT_PUBLIC_CMS_URL=${_CMS_URL}
      - --build-arg
      - NEXT_PUBLIC_CHATBOT_URL=${_CHATBOT_URL}
      - .
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/website:latest
options:
  machineType: E2_HIGHCPU_8
timeout: 1800s
